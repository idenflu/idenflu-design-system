name: Publish GitHub Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@idenflu"

      - name: Verify docs and packages
        run: npm run check

      - name: Preview package contents
        run: |
          npm --cache ./.npm-cache pack --workspace @idenflu/ui-tokens --dry-run
          npm --cache ./.npm-cache pack --workspace @idenflu/ui-icons --dry-run
          npm --cache ./.npm-cache pack --workspace @idenflu/ui-react --dry-run

      - name: Publish tokens
        run: |
          VERSION=$(node -p "require('./packages/tokens/package.json').version")
          if npm view @idenflu/ui-tokens@$VERSION version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "@idenflu/ui-tokens@$VERSION already exists. Skipping."
          else
            npm publish --workspace @idenflu/ui-tokens
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish icons
        run: |
          VERSION=$(node -p "require('./packages/icons/package.json').version")
          if npm view @idenflu/ui-icons@$VERSION version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "@idenflu/ui-icons@$VERSION already exists. Skipping."
          else
            npm publish --workspace @idenflu/ui-icons
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish React components
        run: |
          VERSION=$(node -p "require('./packages/ui-react/package.json').version")
          if npm view @idenflu/ui-react@$VERSION version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "@idenflu/ui-react@$VERSION already exists. Skipping."
          else
            npm publish --workspace @idenflu/ui-react
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
